<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#13848f" />
  <meta name="description" content="A song reflection wheel activity for SAAM — spin, listen, and talk through themes of consent, boundaries, and healthy relationships." />
  <meta property="og:title" content="Spin the Wheel — by SafeBAE" />
  <meta property="og:description" content="An interactive song wheel for SAAM tabling, classroom activities, and group conversation." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256' fill='%2313848f'><circle cx='128' cy='128' r='112' fill='none' stroke='%2313848f' stroke-width='16'/><circle cx='128' cy='128' r='20'/><line x1='128' y1='40' x2='128' y2='80' stroke='%2313848f' stroke-width='12' stroke-linecap='round'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <title>Spin the Wheel — by SafeBAE</title>
  <style>
    :root{
      /* 3-color palette */
      --sb-light:  #d1feff;
      --sb-teal:   #13848f;
      --sb-deep:   #1d414e;

      /* Tokens */
      --bg:        var(--sb-light);
      --text:      var(--sb-deep);
      --muted:     rgba(29,65,78,.65);
      --border:    rgba(19,132,143,.22);
      --border-strong: rgba(19,132,143,.45);
      --shadow:    0 12px 32px rgba(19,132,143,.18);
      --radius:    14px;
      --accent:    var(--sb-teal);
      --font-body: 'Inter', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background:
        radial-gradient(circle at 18% -10%, rgba(255,255,255,.85), transparent 55%),
        radial-gradient(circle at 110% 105%, rgba(19,132,143,.18), transparent 55%),
        linear-gradient(180deg, #e6ffff 0%, #d1feff 55%, #b8f4f8 100%);
      background-attachment: fixed;
    }

    .skip-link {
      position: absolute;
      left: -9999px;
      top: auto;
    }
    .skip-link:focus {
      left: 12px;
      top: 12px;
      background: var(--sb-teal);
      color: var(--sb-light);
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 700;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 16px 40px;
    }

    /* ===== Topbar ===== */
    .topbar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1.5px solid rgba(19,132,143,.20);
      margin-bottom: 18px;
    }
    .topbarRow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .logo {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 10px rgba(19,132,143,.25));
    }
    .logo svg { width: 100%; height: 100%; }
    .brandText { min-width: 0; }
    .title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .2px;
      line-height: 1.2;
      color: var(--sb-deep);
    }
    .brandBy {
      font-size: 11px;
      font-weight: 600;
      color: var(--sb-teal);
      margin-left: 4px;
    }
    .brandSub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 500;
    }
    .topActions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ===== Buttons ===== */
    .btn {
      appearance: none;
      border: 1.5px solid var(--border-strong);
      background: rgba(255,255,255,.65);
      color: var(--sb-deep);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      line-height: 1.2;
    }
    .btn:hover {
      background: rgba(19,132,143,.12);
      border-color: var(--sb-teal);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }
    .btn:focus-visible {
      outline: 2px solid var(--sb-teal);
      outline-offset: 2px;
    }
    .btnPrimary {
      background: var(--sb-teal);
      color: var(--sb-light);
      border-color: var(--sb-teal);
      box-shadow: 0 8px 20px rgba(19,132,143,.35);
    }
    .btnPrimary:hover {
      background: #168f9b;
      border-color: #168f9b;
      color: var(--sb-light);
      box-shadow: 0 12px 28px rgba(19,132,143,.45);
    }
    .btnSmall {
      padding: 8px 12px;
      font-size: 13px;
    }
    .btnQuickExit {
      background: var(--sb-deep);
      color: var(--sb-light);
      border-color: var(--sb-deep);
    }
    .btnQuickExit:hover {
      background: #2a5a6c;
      border-color: #2a5a6c;
      color: var(--sb-light);
    }
    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none !important;
    }
    .btnRow {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    /* ===== Card ===== */
    .card {
      background: rgba(255,255,255,.72);
      border: 1.5px solid rgba(19,132,143,.18);
      border-radius: var(--radius);
      padding: 26px 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    h1.screenTitle {
      font-size: clamp(26px, 6.5vw, 34px);
      font-weight: 900;
      letter-spacing: .3px;
      margin: 0 0 8px;
      line-height: 1.15;
      color: var(--sb-deep);
    }
    .subtitle {
      font-size: 15px;
      color: var(--muted);
      margin: 0 0 18px;
      line-height: 1.55;
    }
    .p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--sb-deep);
      margin: 0 0 12px;
    }
    .p.dim { color: var(--muted); font-size: 14px; }
    ol.steps {
      padding-left: 22px;
      margin: 0 0 18px;
    }
    ol.steps li {
      margin-bottom: 8px;
      line-height: 1.55;
      color: var(--sb-deep);
    }
    ol.steps li::marker { color: var(--sb-teal); font-weight: 800; }

    em { color: var(--sb-teal); font-style: normal; font-weight: 700; }
    strong { color: var(--sb-deep); }

    /* ===== Wheel ===== */
    .wheelContainer {
      position: relative;
      width: min(360px, 86vw);
      aspect-ratio: 1;
      margin: 22px auto 18px;
    }
    .wheelSvg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 14px 30px rgba(19,132,143,.30));
    }
    .wheelRot {
      transform: rotate(0deg);
      transform-box: fill-box;
      transform-origin: 50% 50%;
      transition: transform 4.6s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }
    .wheelLabel {
      transform: rotate(0deg);
      transform-box: fill-box;
      transform-origin: 50% 50%;
      transition: transform 4.6s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }
    .wheelPointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 32px solid var(--sb-deep);
      filter: drop-shadow(0 4px 6px rgba(29,65,78,.40));
      z-index: 5;
    }
    .wheelHub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      background: var(--sb-light);
      border: 4px solid var(--sb-teal);
      border-radius: 50%;
      z-index: 4;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: var(--sb-deep);
      font-size: 11px;
      letter-spacing: 1px;
      box-shadow: 0 0 18px rgba(19,132,143,.35), inset 0 0 10px rgba(19,132,143,.18);
    }

    .spinBtn {
      display: block;
      margin: 8px auto 0;
      padding: 14px 36px;
      font-size: 17px;
      letter-spacing: .8px;
    }

    /* ===== Result reveal ===== */
    .resultReveal {
      margin: 22px 0 0;
      padding: 20px 18px;
      background: rgba(19,132,143,.10);
      border: 1.5px solid rgba(19,132,143,.32);
      border-radius: 14px;
      animation: fadeUp .42s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .resultLabel {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--sb-teal);
      margin-bottom: 6px;
    }
    .songTitle {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
      line-height: 1.2;
      color: var(--sb-deep);
    }
    .songArtist {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .songMeta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      letter-spacing: .3px;
    }
    .listenLink {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--sb-teal);
      text-decoration: none;
      padding: 7px 12px;
      border: 1.5px solid rgba(19,132,143,.40);
      border-radius: 8px;
      background: rgba(255,255,255,.55);
      margin-bottom: 6px;
      transition: all .2s ease;
    }
    .listenLink:hover {
      background: var(--sb-teal);
      color: var(--sb-light);
      border-color: var(--sb-teal);
    }

    .ytEmbed {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      margin: 12px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid rgba(19,132,143,.30);
      background: rgba(29,65,78,.08);
      box-shadow: 0 6px 16px rgba(19,132,143,.18);
    }
    .ytEmbed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .reflectQ {
      font-size: 16px;
      font-weight: 700;
      margin: 18px 0 12px;
      line-height: 1.4;
      color: var(--sb-deep);
    }
    .choiceGrid { display: grid; gap: 10px; }
    .choiceBtn {
      padding: 14px 16px;
      text-align: left;
      background: rgba(255,255,255,.72);
      border: 1.5px solid rgba(19,132,143,.30);
      border-radius: 10px;
      color: var(--sb-deep);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .choiceBtn:hover {
      background: rgba(19,132,143,.12);
      border-color: var(--sb-teal);
      transform: translateY(-1px);
    }
    .choiceBtn i { font-size: 18px; color: var(--sb-teal); }

    /* ===== Discussion screen ===== */
    .themeBadge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .themeBadge.positive {
      background: var(--sb-teal);
      color: var(--sb-light);
    }
    .themeBadge.concerning {
      background: var(--sb-deep);
      color: var(--sb-light);
    }
    .promptList {
      list-style: none;
      padding: 0;
      margin: 0 0 18px;
    }
    .promptList li {
      padding: 12px 14px;
      margin-bottom: 8px;
      background: rgba(255,255,255,.65);
      border-left: 3px solid var(--sb-teal);
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--sb-deep);
    }
    .matchNote {
      padding: 12px 14px;
      border-radius: 8px;
      margin: 8px 0 18px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--sb-deep);
    }
    .matchNote.agree {
      background: rgba(19,132,143,.12);
      border: 1px solid rgba(19,132,143,.35);
    }
    .matchNote.differ {
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(29,65,78,.25);
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .footer a { color: var(--sb-teal); text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
    .copyright {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .wheelRot, .wheelLabel { transition: transform .3s ease !important; }
    }
  </style>
</head>
<body>
  <a href="#screen" class="skip-link">Skip to main content</a>
  <div id="srAnnounce" aria-live="polite" aria-atomic="true" class="sr-only"></div>
  <div class="app">

    <div class="topbar" role="banner">
      <div class="topbarRow">
        <div class="brand">
          <div class="logo">
            <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <line x1="50" y1="64" x2="50" y2="130" stroke="#1d414e" stroke-width="6" stroke-linecap="round" />
              <circle cx="50" cy="50" r="14" fill="#1d414e" />
              <g fill="#13848f">
                <ellipse cx="50" cy="20" rx="10" ry="18"/>
                <ellipse cx="50" cy="80" rx="10" ry="18"/>
                <ellipse cx="20" cy="50" rx="18" ry="10"/>
                <ellipse cx="80" cy="50" rx="18" ry="10"/>
                <ellipse cx="30" cy="30" rx="12" ry="18" transform="rotate(-45 30 30)"/>
                <ellipse cx="70" cy="30" rx="12" ry="18" transform="rotate(45 70 30)"/>
                <ellipse cx="30" cy="70" rx="12" ry="18" transform="rotate(45 30 70)"/>
                <ellipse cx="70" cy="70" rx="12" ry="18" transform="rotate(-45 70 70)"/>
              </g>
            </svg>
          </div>
          <div class="brandText">
            <div class="title">Spin the Wheel <span class="brandBy">by SafeBAE</span></div>
            <div class="brandSub">Songs · Themes · Conversation</div>
          </div>
        </div>
        <button class="btn btnSmall btnQuickExit" data-action="quickExit" title="Leave this page immediately">
          <i class="ph-bold ph-sign-out" aria-hidden="true"></i> Exit
        </button>
      </div>
    </div>

    <main class="card" id="screen" role="main" data-screen="landing"></main>
  </div>

<script>
/* =================================================================
   SONG DATA — from SAAM songs.xlsx
   Slots 1–10, with up to 3 song variants per slot (A, B, C).
   When the wheel lands on a slot, a random variant is revealed.
   ================================================================= */

const SONGS = {
  1: [
    { code: "1A", title: "Blurred Lines Rewrite", artist: "Devon Cole", year: 2021, genre: "Pop / Parody", theme: "boundaries",
      notes: "A direct rewrite of the Robin Thicke original — flips the coercive lyrics so the woman names her own desire and sets her own pace. Consent as the active subject of the song." },
    { code: "1B", title: "Baby, It's Cold Outside", artist: "Covered by many artists", year: "various", genre: "Holiday Standard", theme: "non-consent",
      notes: "A holiday duet that's been re-examined in recent years. The narrator keeps overriding her stated wish to leave, and the line 'what's in this drink?' has been called out as suggesting drugging." },
    { code: "1C", title: "Lover", artist: "Taylor Swift", year: 2019, genre: "Pop", theme: "healthy",
      notes: "Quiet, mutual, ordinary love — a partner committing to a person without drama or performance. A picture of what 'healthy' can sound like." }
  ],
  2: [
    { code: "2A", title: "Blurred Lines", artist: "Robin Thicke ft. Pharrell Williams", year: 2013, genre: "Pop / R&B Dance", theme: "non-consent",
      notes: "A flashpoint song. Lyrics like 'I know you want it' became a public conversation about coercion, pressure, and what consent actually sounds like." },
    { code: "2B", title: "Consent", artist: "Jack & Dean", year: 2014, genre: "Nu-Disco", theme: "healthy",
      notes: "A tongue-in-cheek song about literally pausing to make sure both people want what's happening. Plays consent as sexy, not as a buzzkill." },
    { code: "2C", title: "Make You Feel My Love", artist: "Adele", year: 1997, genre: "Pop", theme: "healthy",
      notes: "A vow to be a steady presence — written by Bob Dylan, made famous by Adele. About care, patience, and showing up for someone." }
  ],
  3: [
    { code: "3A", title: "If You Wanna Touch Her, Ask!", artist: "Shania Twain", year: 1997, genre: "Pop / Country", theme: "boundaries",
      notes: "Title says it. Direct, no metaphor, addressed straight to men: ask first." },
    { code: "3B", title: "We Don't Have To Take Our Clothes Off", artist: "Jermaine Stewart", year: 1986, genre: "Pop", theme: "healthy",
      notes: "An '80s pop song that named slowing things down decades before it was a TikTok phrase. Models that intimacy has many forms." },
    { code: "3C", title: "Funky Cold Medina", artist: "Tone Loc", year: 1989, genre: "Pop / Hip Hop", theme: "drugging",
      notes: "A late-'80s rap hit that frames drugging someone as a punchline. Worth examining: how does a song like this still play at parties?" }
  ],
  4: [
    { code: "4A", title: "Let's Talk About Sex", artist: "Salt-N-Pepa", year: 1990, genre: "Pop / Hip Hop", theme: "healthy",
      notes: "Made in the AIDS era — about breaking the silence. Naming desire and risk is part of consent, not separate from it." },
    { code: "4B", title: "I'm Still A Guy", artist: "Brad Paisley", year: 2008, genre: "Country", theme: "non-consent",
      notes: "Frames ignoring a partner's preferences as just being a man. Worth asking: what does this song treat as 'natural' that's actually a choice?" },
    { code: "4C", title: "RESPECT", artist: "Aretha Franklin", year: 1967, genre: "R&B / Soul", theme: "boundaries",
      notes: "Almost 60 years old and still the standard. A demand for dignity and being treated as an equal partner." }
  ],
  5: [
    { code: "5A", title: "Sharing The Night Together", artist: "Dr. Hook", year: 1977, genre: "Soft Rock", theme: "healthy",
      notes: "A 1977 song where the narrator literally asks — and waits for the answer. Old song, modern consent ethic." },
    { code: "5B", title: "Adore You", artist: "Harry Styles", year: 2019, genre: "Pop", theme: "healthy",
      notes: "Pure, glowing want — a song built on the joy of being into someone who's into you back. No coercion, no game-playing." },
    { code: "5C", title: "Let's Stay Together", artist: "Al Green", year: 1971, genre: "R&B / Soul", theme: "healthy",
      notes: "A promise to stay — through good and not-good. Models long-term commitment without possessiveness." }
  ],
  6: [
    { code: "6A", title: "Drunk Girl", artist: "Chris Janson", year: 2018, genre: "Country", theme: "boundaries",
      notes: "Names the moment a man chooses to take the drunk girl home safely instead of taking advantage. Reframes 'being a good guy' as an active choice, not a default." },
    { code: "6B", title: "Every Breath You Take", artist: "The Police", year: 1983, genre: "Classic Rock", theme: "stalking",
      notes: "Often misread as a love song — Sting himself has called it sinister. About obsession and surveillance after a relationship ends." },
    { code: "6C", title: "Love The Way You Lie", artist: "Eminem ft. Rihanna", year: 2010, genre: "Pop / Rap", theme: "relationship-violence",
      notes: "Vivid depiction of a violent relationship cycle. What does the song say about the pull to stay?" }
  ],
  7: [
    { code: "7A", title: "No", artist: "Meghan Trainor", year: 2016, genre: "Pop", theme: "boundaries",
      notes: "A direct refusal — 'My name is no, my sign is no, my number is no.' No softening, no apology." },
    { code: "7B", title: "Paradise By The Dashboard Light", artist: "Meatloaf", year: 1977, genre: "Classic Rock", theme: "coercion",
      notes: "A song about pressure as part of the seduction — the 'will you love me forever?' bargain played for laughs. Worth asking: who's enjoying this and who isn't?" },
    { code: "7C", title: "Come Away With Me", artist: "Norah Jones", year: 2002, genre: "Soft Rock", theme: "healthy",
      notes: "An invitation, not a command. The narrator asks; the partner is free to say yes or no." }
  ],
  8: [
    { code: "8A", title: "Wannabe", artist: "Spice Girls", year: 1996, genre: "Dance Pop", theme: "healthy", youtubeId: "gJLIiF15wjQ",
      notes: "Says the quiet part loud: if you want me, get along with my friends. Names that boundaries can include who you keep in your life." },
    { code: "8B", title: "Don't Stand So Close To Me", artist: "The Police", year: 1980, genre: "Classic Rock", theme: "power-dynamic",
      notes: "About a teacher and a student. Makes the inappropriate power dynamic explicit — and uncomfortable." },
    { code: "8C", title: "Nights On Broadway", artist: "Bee Gees", year: 1975, genre: "R&B / Dance", theme: "stalking",
      notes: "Lyrics describe waiting in the shadows and finding a partner. Romantic on the surface; surveillance and pursuit underneath." }
  ],
  9: [
    { code: "9A", title: "Levitating", artist: "Dua Lipa", year: 2020, genre: "Dance Pop", theme: "healthy",
      notes: "The high of a brand-new connection — feeling lighter, safer, more yourself with someone. Excited, mutual want." },
    { code: "9B", title: "Green Light", artist: "John Legend", year: 2008, genre: "R&B / Dance Pop", theme: "boundaries",
      notes: "The narrator literally asks for permission, named in the title. Pursuit framed as something you do *with* a partner, not *to* them." },
    { code: "9C", title: "He Hit Me (And It Felt Like A Kiss)", artist: "The Crystals", year: 1962, genre: "Pop / Soul", theme: "relationship-violence",
      notes: "A 1962 song that frames physical violence as proof of love. So contested it was pulled from radio. Useful for asking: how did this ever sound romantic?" }
  ],
  10: [
    { code: "10A", title: "Do You Wanna Touch Me (Oh Yeah)", artist: "Joan Jett", year: 1980, genre: "Classic Rock", theme: "healthy",
      notes: "Asks the question — over and over — and waits for the answer. Consent as part of the chorus." },
    { code: "10B", title: "Slow Down", artist: "Alicia Keys", year: 2003, genre: "R&B", theme: "healthy",
      notes: "About a couple slowing down and protecting their relationship rather than rushing. Models that 'not yet' is part of consent." }
  ]
};

/* =================================================================
   THEME METADATA — labels, category (positive/concerning), prompts
   ================================================================= */

const THEMES = {
  'healthy': {
    label: "Consent & healthy relationship",
    category: "positive",
    prompts: [
      "What feels different about how this song describes love, compared to others on this wheel?",
      "What does respect or mutual want sound like in the lyrics?",
      "What's one thing in this song you'd want in your own relationships?"
    ]
  },
  'boundaries': {
    label: "Boundaries & self-worth",
    category: "positive",
    prompts: [
      "What boundary is the singer setting — or asking for? How clearly is it stated?",
      "Have you ever felt pressure to soften a 'no'? What made it hard?",
      "What's a healthy way to respond when someone sets a boundary with you?"
    ]
  },
  'non-consent': {
    label: "Non-consent & coercion",
    category: "concerning",
    prompts: [
      "What's the difference between flirting and pressure? Where do you draw the line?",
      "How does this song treat the word 'no'?",
      "What would real consent actually sound like in this scenario?"
    ]
  },
  'coercion': {
    label: "Coercion & pressure",
    category: "concerning",
    prompts: [
      "Where in the song does 'asking' become 'pressuring'?",
      "Is the other person enjoying this scene as much as the narrator? How can you tell?",
      "What would you want a friend to say to you if you were in this situation?"
    ]
  },
  'stalking': {
    label: "Stalking & surveillance",
    category: "concerning",
    prompts: [
      "What does the song romanticize that, in real life, would feel scary or unsafe?",
      "If a friend told you their ex was acting like the narrator of this song, what would you say?",
      "Why do you think songs like this get labeled 'romantic' on the radio?"
    ]
  },
  'relationship-violence': {
    label: "Relationship violence",
    category: "concerning",
    prompts: [
      "What cycles or patterns does the song describe?",
      "What might keep someone in a relationship like this? What might help them leave?",
      "How does the song complicate the idea of 'just leaving'?"
    ]
  },
  'power-dynamic': {
    label: "Power imbalance",
    category: "concerning",
    prompts: [
      "Who has more power in this song's setup — and how does that change what 'consent' means?",
      "What makes a power-imbalanced relationship feel risky, even if both people say they want it?",
      "Where else do you see this kind of dynamic — at work, school, online?"
    ]
  },
  'drugging': {
    label: "Drugging & incapacitation",
    category: "concerning",
    prompts: [
      "What does the song treat as a punchline that, in real life, is a crime?",
      "How does the music or vibe of the song shape how we hear the lyrics?",
      "If this song came on at a party tonight, how would you feel? What might you say?"
    ]
  }
};

/* =================================================================
   STATE & WHEEL CONFIG
   ================================================================= */

const state = { screen: 'landing', selectedSlot: null, selectedSong: null, choice: null };

const SLOT_COUNT = 10;
const SLOT_DEG = 360 / SLOT_COUNT;

// Alternating teal / light for clean adjacency.
const SLICE_COLORS = [
  '#13848f', '#d1feff', '#13848f', '#d1feff', '#13848f',
  '#d1feff', '#13848f', '#d1feff', '#13848f', '#d1feff'
];
// Number text color: light on teal slices, deep on light slices.
function labelColorFor(i) {
  return SLICE_COLORS[i] === '#13848f' ? '#d1feff' : '#1d414e';
}

let currentRotation = 0;

/* =================================================================
   SVG WHEEL BUILDER
   ================================================================= */

function buildWheelSvg() {
  const cx = 100, cy = 100, r = 92;
  let slices = '';
  let labels = '';
  for (let i = 0; i < SLOT_COUNT; i++) {
    const startAngle = (i * SLOT_DEG - 90) * Math.PI / 180;
    const endAngle = ((i + 1) * SLOT_DEG - 90) * Math.PI / 180;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const path = 'M ' + cx + ' ' + cy + ' L ' + x1.toFixed(3) + ' ' + y1.toFixed(3)
      + ' A ' + r + ' ' + r + ' 0 0 1 ' + x2.toFixed(3) + ' ' + y2.toFixed(3) + ' Z';
    slices += '<path d="' + path + '" fill="' + SLICE_COLORS[i] + '" stroke="#1d414e" stroke-width="2" />';

    const midAngle = ((i * SLOT_DEG + SLOT_DEG / 2) - 90) * Math.PI / 180;
    const lx = cx + (r * 0.65) * Math.cos(midAngle);
    const ly = cy + (r * 0.65) * Math.sin(midAngle);
    labels += '<g transform="translate(' + lx.toFixed(2) + ' ' + ly.toFixed(2) + ')">'
            +   '<g class="wheelLabel">'
            +     '<text text-anchor="middle" dominant-baseline="middle" fill="' + labelColorFor(i) + '" font-size="22" font-weight="900" font-family="Inter, sans-serif">'
            +     (i + 1) + '</text>'
            +   '</g>'
            + '</g>';
  }
  return '<svg class="wheelSvg" viewBox="0 0 200 200" aria-hidden="true">'
       + '<g class="wheelRot" id="wheelRot">'
       +   '<g>' + slices + '</g>'
       +   '<g>' + labels + '</g>'
       + '</g>'
       + '</svg>';
}

/* =================================================================
   SCREEN RENDERERS
   ================================================================= */

function go(screen) {
  state.screen = screen;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const el = document.getElementById('screen');
  el.setAttribute('data-screen', state.screen);
  if (state.screen === 'landing') {
    el.innerHTML = renderLanding();
  } else if (state.screen === 'wheel') {
    el.innerHTML = renderWheel();
    const wheelRot = document.getElementById('wheelRot');
    if (wheelRot) {
      wheelRot.style.transition = 'none';
      wheelRot.style.transform = 'rotate(' + currentRotation + 'deg)';
      void wheelRot.offsetHeight;
      wheelRot.style.transition = '';
    }
    document.querySelectorAll('.wheelLabel').forEach(function(label) {
      label.style.transition = 'none';
      label.style.transform = 'rotate(' + (-currentRotation) + 'deg)';
      void label.offsetHeight;
      label.style.transition = '';
    });
  } else if (state.screen === 'discuss') {
    el.innerHTML = renderDiscuss();
  }
  attachActions();
}

function renderLanding() {
  return ''
    + '<h1 class="screenTitle">Spin the Wheel</h1>'
    + '<div class="subtitle">A song reflection activity inspired by the ever amazing Jen Stanley at Roger Williams University.</div>'
    + '<p class="p"><strong>How it works:</strong></p>'
    + '<ol class="steps">'
    +   '<li>Spin the wheel.</li>'
    +   '<li>A song comes up. Listen to a clip — or just read the title and notes.</li>'
    +   '<li>Decide: does the song reflect <em>consent and positive relationships</em>, or something more concerning?</li>'
    +   '<li>Talk it through. Disagreement is welcome — that\'s the point.</li>'
    + '</ol>'
    + '<p class="p dim">Themes covered: consent, boundaries, healthy &amp; unhealthy relationships, coercion, stalking, power imbalance, drugging, and relationship violence.</p>'
    + '<div class="btnRow">'
    +   '<button class="btn btnPrimary" data-action="startWheel"><i class="ph-bold ph-shuffle" aria-hidden="true"></i> Start spinning</button>'
    + '</div>';
}

function renderWheel() {
  const showResult = state.selectedSong !== null;
  let result = '';
  if (showResult) {
    const song = state.selectedSong;
    result = ''
      + '<div class="resultReveal" role="region" aria-label="Song result">'
      +   '<div class="resultLabel">Slot ' + state.selectedSlot + ' (' + escapeHtml(song.code) + ') · You landed on</div>'
      +   '<div class="songTitle">' + escapeHtml(song.title) + '</div>'
      +   '<div class="songArtist">' + escapeHtml(song.artist) + '</div>'
      +   '<div class="songMeta">' + escapeHtml(song.genre) + ' · ' + escapeHtml(String(song.year)) + '</div>'
      +   renderListen(song)
      +   '<div class="reflectQ">Does this song reflect consent and positive relationships — or something else?</div>'
      +   '<div class="choiceGrid">'
      +     '<button class="choiceBtn" data-choice="consent"><i class="ph-bold ph-check-circle" aria-hidden="true"></i> Yes — consent &amp; positive relationship</button>'
      +     '<button class="choiceBtn" data-choice="concerning"><i class="ph-bold ph-warning" aria-hidden="true"></i> No — concerning or unhealthy</button>'
      +     '<button class="choiceBtn" data-choice="mixed"><i class="ph-bold ph-question" aria-hidden="true"></i> Mixed / I\'m not sure</button>'
      +   '</div>'
      + '</div>';
  }

  const spinBtn = showResult ? '' :
    '<button class="btn btnPrimary spinBtn" id="spinBtn" data-action="spin">'
    + '<i class="ph-bold ph-shuffle" aria-hidden="true"></i> Spin the wheel'
    + '</button>';

  return ''
    + '<h1 class="screenTitle">Spin</h1>'
    + '<div class="subtitle">Tap the button. The wheel picks a number, the number picks a song.</div>'
    + '<div class="wheelContainer" aria-hidden="true">'
    +   '<div class="wheelPointer"></div>'
    +   buildWheelSvg()
    +   '<div class="wheelHub">SPIN</div>'
    + '</div>'
    + spinBtn
    + result
    + '<div class="btnRow">'
    +   '<button class="btn" data-action="home"><i class="ph-bold ph-arrow-left" aria-hidden="true"></i> Back to start</button>'
    + '</div>';
}

function renderDiscuss() {
  const song = state.selectedSong;
  const theme = THEMES[song.theme];
  const choiceCategory = state.choice === 'consent' ? 'positive'
                       : state.choice === 'concerning' ? 'concerning'
                       : 'mixed';

  let matchNote = '';
  if (choiceCategory === 'mixed') {
    matchNote = '<div class="matchNote differ"><strong>Good instinct.</strong> A lot of songs sit in the gray area. The notes below name what\'s actually going on — but your read still matters.</div>';
  } else if (choiceCategory === theme.category) {
    matchNote = '<div class="matchNote agree"><strong>That tracks.</strong> Most listeners read this song the same way. Talk through <em>why</em> — what specifically signaled it?</div>';
  } else {
    matchNote = '<div class="matchNote differ"><strong>Worth digging into.</strong> Your read is different from how most people interpret this song. That\'s often the most useful conversation — what made you read it that way?</div>';
  }

  return ''
    + '<h1 class="screenTitle">Let\'s talk about it</h1>'
    + '<div class="resultReveal" style="margin-top:0;">'
    +   '<div class="resultLabel">' + escapeHtml(song.code) + ' · ' + escapeHtml(song.artist) + '</div>'
    +   '<div class="songTitle">' + escapeHtml(song.title) + '</div>'
    +   '<div class="songMeta">' + escapeHtml(song.genre) + ' · ' + escapeHtml(String(song.year)) + '</div>'
    +   '<span class="themeBadge ' + theme.category + '">' + theme.label + '</span>'
    + '</div>'
    + matchNote
    + '<p class="p"><strong>What\'s going on in this song:</strong> ' + escapeHtml(song.notes) + '</p>'
    + '<p class="p"><strong>Discussion prompts:</strong></p>'
    + '<ul class="promptList">'
    +   theme.prompts.map(function(p){ return '<li>' + escapeHtml(p) + '</li>'; }).join('')
    + '</ul>'
    + renderListen(song)
    + '<div class="btnRow">'
    +   '<button class="btn btnPrimary" data-action="startWheel"><i class="ph-bold ph-shuffle" aria-hidden="true"></i> Spin again</button>'
    +   '<button class="btn" data-action="home"><i class="ph-bold ph-house" aria-hidden="true"></i> Done</button>'
    + '</div>';
}

/* =================================================================
   SPIN LOGIC
   ================================================================= */

function spin() {
  const btn = document.getElementById('spinBtn');
  const wheelRot = document.getElementById('wheelRot');
  if (!btn || !wheelRot) return;

  btn.disabled = true;
  btn.innerHTML = '<i class="ph-bold ph-circle-notch" aria-hidden="true"></i> Spinning…';
  announce('Spinning the wheel');

  const slot = Math.floor(Math.random() * SLOT_COUNT) + 1;
  const slotMidAngle = (slot - 1) * SLOT_DEG + SLOT_DEG / 2;
  // Account for the wheel's existing rotation so we always end aligned to the slot's midpoint.
  const absCurrent = currentRotation % 360;
  const absTarget = (360 - slotMidAngle) % 360;
  const delta = ((absTarget - absCurrent) + 360) % 360;
  const fullSpins = 5 + Math.floor(Math.random() * 3);
  const target = currentRotation + delta + fullSpins * 360;
  currentRotation = target;

  wheelRot.style.transition = '';
  void wheelRot.offsetHeight;
  wheelRot.style.transform = 'rotate(' + target + 'deg)';

  document.querySelectorAll('.wheelLabel').forEach(function(label) {
    label.style.transition = '';
    label.style.transform = 'rotate(' + (-target) + 'deg)';
  });

  setTimeout(function() {
    const songList = SONGS[slot];
    const song = songList[Math.floor(Math.random() * songList.length)];
    state.selectedSlot = slot;
    state.selectedSong = song;
    announce('Landed on slot ' + slot + '. Song: ' + song.title + ' by ' + song.artist);
    render();
  }, 4700);
}

/* =================================================================
   ACTIONS, HELPERS
   ================================================================= */

function attachActions() {
  document.querySelectorAll('[data-action]').forEach(function(el) {
    el.addEventListener('click', function() {
      const action = el.getAttribute('data-action');
      if (action === 'startWheel') {
        state.selectedSlot = null;
        state.selectedSong = null;
        state.choice = null;
        go('wheel');
      } else if (action === 'spin') {
        spin();
      } else if (action === 'home') {
        state.selectedSlot = null;
        state.selectedSong = null;
        state.choice = null;
        go('landing');
      } else if (action === 'quickExit') {
        try { window.location.replace('https://www.google.com'); } catch(e) {}
      }
    });
  });
  document.querySelectorAll('[data-choice]').forEach(function(el) {
    el.addEventListener('click', function() {
      state.choice = el.getAttribute('data-choice');
      go('discuss');
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

function renderListen(song) {
  // TEMP: any song without its own youtubeId falls back to the Wannabe video for preview. Remove the fallback once real IDs are filled in.
  const videoId = song.youtubeId || 'gJLIiF15wjQ';
  return '<div class="ytEmbed">'
    + '<iframe '
    +   'src="https://www.youtube-nocookie.com/embed/' + encodeURIComponent(videoId) + '?rel=0" '
    +   'title="' + escapeHtml(song.title + ' by ' + song.artist) + '" '
    +   'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" '
    +   'allowfullscreen></iframe>'
    + '</div>';
}

function announce(msg) {
  const el = document.getElementById('srAnnounce');
  if (el) el.textContent = msg;
}

/* ===== INIT ===== */
render();
</script>
</body>
</html>
